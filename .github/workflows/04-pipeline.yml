name: CI Pipeline
on:
  workflow_dispatch

jobs:
  lint:
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    steps:
      - run: echo "린트 통과"

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 카운트
        id: count
        run: echo "value=5" >> $GITHUB_OUTPUT

      - name: 테스트
        run: echo "테스트 통과:5/5"

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: set-name
        id: set-name
        run: echo "value=myapp-${{ github.run_number }}.jar" >> $GITHUB_OUTPUT

      - name: 빌드 완료
        run: echo "빌드 완료"

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-test, build]
    if: ${{ github.ref_name == 'main' }}
    steps:
      - name: 출력
        run: |
          echo "테스트 통과 수: ${{ needs.unit-test.outputs.passed_count }}"
          echo "배포 아티팩트: ${{ needs.build.outputs.artifact_name }}"
          echo "배포 환경: production"

  notify:
    runs-on: ubuntu-latest
    needs: [lint, unit-test, build, deploy]
    steps:
      - name: 출력
        if: ${{ always() }}
        run: |
          echo "=== 파이프라인 결과 ==="
          echo "lint: ${{ needs.lint.result }}"
          echo "unit-test: ${{ needs.unit-test.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "deploy: ${{ needs.deploy.result }}"
